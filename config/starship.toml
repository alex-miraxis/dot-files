"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 500

format = """
$directory$git_branch$git_status$nodejs$python$golang$rust$docker_context$cmd_duration
$character"""

[character]
success_symbol = "[❯](bold #a9c78f)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold #a9c78f)"

[directory]
style = "bold cyan"
truncation_length = 3
truncation_symbol = "…/"
read_only = "  "
format = "[ $path]($style)[$read_only](red) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "≡ "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "yellow"
format = '[$symbol($version )]($style)'

[golang]
symbol = " "
style = "cyan"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "red"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "blue"
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "[ $duration]($style) "
